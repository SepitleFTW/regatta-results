name: Sync Regattas

on:
  schedule:
    - cron: '0 5 * * *'   # 7am SA time (UTC+2) every day
  workflow_dispatch:        # also allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sync script
        run: node scripts/sync-regattas.mjs

      - name: Commit if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add regatta-results/src/data/auto-discovered.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-sync new regattas [skip ci]"
            git push
          fi
